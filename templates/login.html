<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – JLPT Trainer</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/anime-theme.css') }}"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/particles.css') }}"/>
</head>
<body>
  <div class="particles-container" id="particles"></div>
  <nav>
    <a class="logo" href="/">⛩️ JLPT Trainer</a>
    <div class="nav-right">
      <a href="/register" style="color:#f4c2cc;">Register</a>
      <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">Dark</button>
    </div>
  </nav>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-wrap">
        {% for cat, msg in messages %}
          <div class="flash {{ cat }}">{{ msg }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-mascot"></div>
      <h2 class="auth-title">Welcome Back 🌸</h2>
      <p class="auth-subtitle">Continue your Japanese learning</p>

      <form method="POST" action="/login">
        <div class="form-group">
          <label>Email or Phone Number</label>
          <div class="input-wrap">
            <span class="input-icon">📧</span>
            <input type="text" name="identifier" placeholder="you@email.com" required/>
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" name="password" placeholder="Your password" required/>
          </div>
        </div>
        <button type="submit" class="auth-btn">Step Inside 🍃</button>
      </form>

      <div class="nature-divider">🌾 · 🌸 · 🌿</div>
      <div class="auth-link">New here? <a href="/register">Create an account</a></div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/anime-mascot.js') }}"></script>
  <script></script>
  <script src="{{ url_for('static', filename='js/particles.js') }}"></script>
  <script src="/static/js/theme.js"></script>
</body>
</html>
